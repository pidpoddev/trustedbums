<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title>Trusted Bums serious buyer hero plate</title>
  <desc>Text-free hero illustration with a structured buyer brief, a protected orange route, and a clearly separate secondary lane.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f2e8"/>
      <stop offset="100%" stop-color="#f5eee4"/>
    </linearGradient>

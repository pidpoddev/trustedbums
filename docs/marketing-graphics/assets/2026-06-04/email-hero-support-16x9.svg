<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Trusted Bums email hero support plate</title>
  <desc id="desc">Text-free wide plate with a calm relationship map connecting from a crowded outreach zone toward a protected buyer conversation zone.</desc>

## Ask Packs

Draft safe non-promissory asks for existing Bums, trusted operators, advisors, founders, investors, or candidate Bums. Keep them specific to the target account and avoid passive-income or guaranteed-payout framing.

## Managing Bum And Opportunity Scout Pipeline

Track candidate Managing Bums, Opportunity Scouts, direct active Bum recruits, no-economic referrers, approval status, next touch, and route coverage.

## Inner Circle Intake

Maintain intake language, fields, matching rules, first-degree matches, Second Circle routes, invite recommendations, public-source evidence rules, verification status, and privacy guardrails for each new Bum, Managing Bum, or priority Bum.

## Relationship Screening System

Define and maintain screening questions, scoring, thresholds, minimum fields, current screening status, and immediate screening actions for priority accounts. Use decisions `qualified_route`, `verify_first`, `weak_route`, and `disqualify`.

## Supply Scorecard

Track at minimum: `priority_accounts_reviewed`, `accounts_with_named_candidate_bum`, `accounts_with_referrer_path`, `candidate_bums_invited`, `candidate_bums_approved`, `routes_claimed`, `routes_disqualified`, `no_route_reason_count`, and `approval_blocked_compensation_paths`.

## Approval Packets

Prepare legal/economics review packets for compensation constructs when needed. Include option, eligibility, trigger event, payout source, cap, dispute rule, disclosure rule, termination rule, and payment timing. The Legal/Compliance Reviewer may help prepare issue lists, but it is not a lawyer and does not approve terms.

## Access Requests And Evidence Gaps

Record missing opportunity exports, CRM data, Bum roster data, trusted-referrer notes, approval owners, legal/economics decisions, or private-network verification needed to execute.

## Agent Inputs

- Date of run:

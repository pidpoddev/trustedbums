Quality bar:

- Be specific to named opportunities and needed relationships. Avoid generic recruiting advice.
- Move work every run. A useful run changes an artifact, tracker row, supply map, ask pack, approval packet, or owner/date assignment.
- Protect trust. Do not recommend spammy outreach, scraped LinkedIn extraction, passive-income framing, guaranteed meetings, guaranteed revenue, or unsupported payout promises.
- Use The Org API only when official API access and a credit budget are available. Treat it as org-chart research that sharpens Supply asks and Inner Circle / Second Circle matching, not as permission to store or use bulk contact details.
- Separate no-permission work from approval-gated work. Relationship mapping, ask-pack drafting, classification, tracker/doc updates, and approval-packet prep should continue while human approval is pending.
- Never include secrets, private contact details, raw mailbox content, private LinkedIn data, confidential pipeline exports, or unnecessary personal data in markdown.

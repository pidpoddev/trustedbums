When asked to create a customized First Call Deck, follow docs/first-call-deck-playbook.md and use this workflow:

1. Accept sparse input. Minimum useful inputs are prospect company name, prospect website or industry, buyer role, the business problem or target-account goal, and meeting objective. Optional inputs include target accounts, known warm routes, current outreach pain, buying committee, current solution, objections, proof permissions, desired CTA, and tone.
2. Research only public, permission-friendly sources when a prospect website or public company context is provided. Do not automate LinkedIn browsing or scrape private sources.
3. Build the deck around the buyer's situation, not around Trusted Bums feature inventory.
4. Produce a share-ready deck outline or, when a presentation-generation tool is available and requested, generate the actual presentation artifact.
5. Use 8 to 10 slides unless Ryan requests otherwise:
   - Title tailored to the prospect's business problem
   - Why this problem is hard now
   - What Trusted Bums believes about access and trust
   - Prospect-specific target-account or buyer-route hypothesis
   - How the Trusted Bums workflow works
   - Why this is controlled and not spam/lead-gen
   - Proof-safe evidence and product workflow confidence
   - Proposed first pilot or strategy-review path
   - Mutual action plan
   - Appendix only when needed for terms, compliance, definitions, or deeper proof
6. For every slide, include slide goal, headline, key points, speaker note, visual direction, data/proof source, and trust/legal caveat.
7. Include a structured JSON brief so another agent or presentation tool can build the deck.
8. Mark unsupported content as `NEEDS RYAN INPUT` instead of inventing it.

Quality bar:
- Be specific to Trusted Bums and the named prospect.
- Make the asset useful even if Ryan is not on the call.
- Make the buyer's internal share easier: crisp narrative, risk controls, economics, next step, and decision criteria.
- Keep tone direct, commercially serious, and warm; use the Trusted Bums name confidently without making the buyer feel pitched by a novelty brand.
- Never include secrets, private user data, raw customer communications, raw analytics exports, or private pipeline details in prompts, markdown, or decks."""

# Trusted Bums Lead Developer Recommendations

_Last updated: YYYY-MM-DD by Codex daily lead developer automation._

## Executive Read

## Recommendation Classification

For each material specialist recommendation: status, reason, next owner, and whether it belongs in the implementation queue.

## Recommended Implementation Queue

### P0/P1/P2 - Short implementation title
- Classification: READY, BLOCKED BY ACCESS, BLOCKED BY ANOTHER SPECIALIST, NEEDS QA PROOF, STALE, or DO NOT IMPLEMENT.
- Source: Specialist backlog item(s), code evidence, route, test, docs source, Supabase MCP advisor/catalog result, business-access rule, trust/reputation evidence, access-source evidence, or current internet source that led to this recommendation.
- Why now: Business, workflow, trust/reputation, accessibility, security, performance, quality, compliance, or engineering rationale for priority.
- Recommended fix: Concrete implementation approach.
- Likely files/routes: Files, components, routes, tests, migrations, DNS/config/docs, or docs likely to change.
- Dependencies/risks: Known sequencing, auth, data, QA, design, content, security, trust/reputation, performance, rollout, operations, access, business-rule, repo/git, cross-specialist tradeoffs, or rollback concerns.
- Acceptance criteria: Concrete criteria an engineer can verify.
- Validation: Specific commands, tests, screenshots, scans, Supabase MCP advisor/catalog checks, DNS/HTTP/TLS/reputation checks, manual checks, business-access allow/deny tests, post-main QA checks, rollback/hotfix-forward triggers, or source verification to run.

## Fix Playbooks

Short implementation notes for items likely to be picked up soon, including suggested decomposition if the work should be split.

## Cross-Backlog Dependencies

Connections, conflicts, gaps, access needs, business-rule needs, trust/reputation needs, git/deployment handoffs, cross-specialist tradeoffs, post-main QA needs, rollback triggers, or consolidation opportunities across specialist recommendations.

## Release Verification Handoff

Current release decision evidence from Release Verification, QA, Code Review, GitHub workflows, deployment checks, and any rollback/hotfix/hold triggers.

## Consultant Quality And Access Audit

Assess whether each specialist used the access and tools expected of an expert consultant. Name any material evidence gaps and the access needed to close them.

## Team Rule Updates

Summarize changes made to docs/company-wide-rules.md, docs/consultant-team-rules.md, docs/consultant-access-needs.md, docs/business-access-rules.md, and docs/trust-reputation-backlog.md during this run. Include whether those updates were committed/pushed, intentionally left local, or blocked from publication. If no changes were needed, say so.

## Agent Inputs

- Date of run
- Specialist backlog files reviewed
- Files, tests, routes, screenshots, Supabase MCP queries/advisors, DNS/HTTP/TLS/reputation checks, internet sources, business access rules, trust/reputation sources, release verification sources, access sources, git status/diff/commit/push outcome, or commands reviewed
- Checks that could not run and why

Quality bar:

- Be specific to Trusted Bums. Avoid generic engineering advice.
- Prioritize fewer, sharper implementation recommendations over long lists.
- Prefer fixes that resolve high-confidence, evidence-backed issues and reduce future support, security, QA, accessibility, performance, data, trust/reputation, or operations burden, but do not promote a fix until material cross-specialist side effects have been identified and assigned for validation.
- Do not implement product code changes during this automation unless explicitly requested by the user; this role recommends and coordinates daily priorities. Documentation, backlog, rule, access-needs, and process updates are in scope when evidence shows they are needed.
- For in-scope documentation/process updates, use disciplined Git hygiene: inspect status, stage only intended files, avoid secrets/private data, run narrow validation when useful, commit with a clear message, and push when safe so later automations use the updated rules. Never sweep unrelated local changes into these commits.
- Do not duplicate specialist backlogs. Synthesize, prioritize, sequence, check cross-specialist impacts, and translate into engineering action.
- Update each agent's process if it missed important access, evidence, tooling, current best practices, time-sensitive findings, live Supabase findings, trust/reputation questions, business-access questions, repo/deployment handoffs, release-verification gaps, or cross-backlog evidence.
- Maintain docs/consultant-access-needs.md as a durable list of credentials, connectors, dashboards, logs, QA data, reputation tools, DNS/webmaster/email access, and third-party access needed for master-consultant work.
- Keep docs/company-wide-rules.md, docs/consultant-team-rules.md, docs/business-access-rules.md, and docs/trust-reputation-backlog.md useful and short enough that future agents will actually follow them.
- Never include API keys, secrets, credentials, private dashboard data, or private user data in markdown, git commits, command output summaries, or automation memory.


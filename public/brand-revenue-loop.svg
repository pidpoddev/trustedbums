<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Paid on results illustration</title>
  <desc id="desc">Customer revenue reaches the client first, then Trusted Bums is paid from the successful outcome.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="650" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8ef"/>
      <stop offset="1" stop-color="#f1f7f4"/>
    </linearGradient>
    <linearGradient id="orange" x1="142" y1="120" x2="580" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff8a1f"/>
      <stop offset="1" stop-color="#f15a16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#08111f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="664" height="464" rx="42" fill="url(#bg)"/>
  <circle cx="122" cy="108" r="58" fill="#ff7a1a" opacity=".11"/>
  <circle cx="616" cy="412" r="72" fill="#178b83" opacity=".12"/>

  <rect x="82" y="118" width="236" height="220" rx="34" fill="#08111f" filter="url(#shadow)"/>
  <circle cx="200" cy="188" r="42" fill="#fff8ef"/>
  <path d="M155 264c11-38 26-58 45-58s34 20 45 58" fill="#fff8ef" opacity=".92"/>
  <rect x="120" y="286" width="160" height="22" rx="11" fill="#ff7a1a"/>
  <text x="200" y="378" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="800" fill="#08111f">YOU GET PAID</text>

  <rect x="402" y="118" width="236" height="220" rx="34" fill="#fff" stroke="#eadbc9" stroke-width="4" filter="url(#shadow)"/>
  <rect x="438" y="154" width="164" height="126" rx="24" fill="#08111f"/>
  <path d="M468 242h104" stroke="#fff8ef" stroke-width="12" stroke-linecap="round"/>
  <path d="M468 206h70" stroke="#fff8ef" stroke-width="12" stroke-linecap="round" opacity=".74"/>
  <circle cx="594" cy="280" r="44" fill="url(#orange)"/>
  <text x="579" y="297" font-family="Space Grotesk, Arial, sans-serif" font-size="46" font-weight="800" fill="#fff8ef">$</text>
  <text x="520" y="378" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="800" fill="#08111f">THEN WE DO</text>

  <path d="M330 226h52" stroke="#178b83" stroke-width="16" stroke-linecap="round"/>
  <path d="M374 188l42 38-42 38" fill="none" stroke="#178b83" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="152" y="410" width="416" height="52" rx="26" fill="#08111f"/>
  <text x="360" y="445" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="2.4" fill="#fff8ef">NO WIN, NO COMMISSION</text>
  <circle cx="548" cy="436" r="10" fill="#ff7a1a"/>
</svg>

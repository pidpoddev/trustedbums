name: E2E Smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: URL to smoke test
        required: true
        default: https://trustedbums.com
      mutation_mode:
        description: Allow deep audit to create and clean up tagged QA records
        required: true
        type: boolean
        default: false
  workflow_run:
    workflows:
      - Deploy TrustedBums to DreamHost
    types:
      - completed

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      QA_TARGET_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.target_url || 'https://trustedbums.com' }}
      QA_MUTATION_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mutation_mode && '1' || '0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run deployed smoke tests
        env:
          QA_BASE_URL: ${{ env.QA_TARGET_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
        run: pnpm run qa:env && pnpm exec playwright test tests/e2e/staging-smoke.spec.ts tests/e2e/authenticated-role-smoke.spec.ts tests/e2e/portal-interaction-audit.spec.ts

      - name: Run deep workflow hotfix audit
        if: always()
        env:
          QA_BASE_URL: ${{ env.QA_TARGET_URL }}
          QA_DEEP_MUTATION: ${{ env.QA_MUTATION_MODE }}
          QA_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          QA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.QA_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
        run: pnpm run qa:deep

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

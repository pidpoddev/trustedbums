name: E2E Smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: URL to smoke test
        required: true
        default: https://trustedbums.com

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run deployed smoke tests
        env:
          QA_BASE_URL: ${{ inputs.target_url }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_PASSWORD: ${{ secrets.QA_CLIENT_ADMIN_PASSWORD }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_FINANCE_PASSWORD: ${{ secrets.QA_CLIENT_FINANCE_PASSWORD }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_CLIENT_MEMBER_PASSWORD: ${{ secrets.QA_CLIENT_MEMBER_PASSWORD }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
          QA_BUM_PASSWORD: ${{ secrets.QA_BUM_PASSWORD }}
        run: pnpm run qa:env && pnpm run test:e2e

name: Complete Visual UI Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Production URL to audit
        required: true
        default: https://trustedbums.com
      roles:
        description: Comma-separated roles to audit (ADMIN, CLIENT_ADMIN, CLIENT_FINANCE, BUM)
        required: true
        default: ADMIN,CLIENT_ADMIN,CLIENT_FINANCE,BUM

jobs:
  complete-visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run complete production visual audit
        env:
          QA_BASE_URL: ${{ inputs.target_url }}
          QA_VISUAL_ROLES: ${{ inputs.roles }}
          QA_VISUAL_AUDIT_SCOPE: complete
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
        run: pnpm run qa:env && pnpm run qa:visual:complete

      - name: Upload complete visual audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: complete-visual-ui-audit
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

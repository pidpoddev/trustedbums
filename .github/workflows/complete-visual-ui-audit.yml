name: Complete Visual UI Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Production URL to audit
        required: true
        default: https://trustedbums.com
      roles:
        description: Comma-separated roles to audit (ADMIN, CLIENT_ADMIN, CLIENT_FINANCE, BUM)
        required: true
        default: ADMIN,CLIENT_ADMIN,CLIENT_FINANCE,BUM

jobs:
  complete-visual-audit-matrix:
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.roles.outputs.roles }}

    steps:
      - name: Build selected role matrix
        id: roles
        env:
          QA_VISUAL_ROLES_INPUT: ${{ inputs.roles }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const allowed = ["ADMIN", "CLIENT_ADMIN", "CLIENT_FINANCE", "BUM"];
          const raw = process.env.QA_VISUAL_ROLES_INPUT || "";
          const selected = raw
            .split(",")
            .map((role) => role.trim().toUpperCase())
            .filter(Boolean);
          const roles = selected.length ? selected : allowed;
          const invalid = roles.filter((role) => !allowed.includes(role));

          if (invalid.length) {
            console.error(`Invalid role(s): ${invalid.join(", ")}. Allowed values: ${allowed.join(", ")}.`);
            process.exit(1);
          }

          console.log(`roles=${JSON.stringify([...new Set(roles)])}`);
          NODE

  complete-public-visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run complete public visual audit
        env:
          QA_BASE_URL: ${{ inputs.target_url }}
          QA_VISUAL_AUDIT_SCOPE: complete
          QA_VISUAL_INCLUDE_AUTH: "false"
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
        run: pnpm run qa:env && pnpm exec playwright test tests/e2e/visual-ui-audit.spec.ts --workers=1

      - name: Upload complete visual audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: complete-visual-ui-audit-public
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  complete-role-visual-audit:
    needs: complete-visual-audit-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJson(needs.complete-visual-audit-matrix.outputs.roles) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run complete ${{ matrix.role }} visual audit
        env:
          QA_BASE_URL: ${{ inputs.target_url }}
          QA_VISUAL_ROLES: ${{ matrix.role }}
          QA_VISUAL_AUDIT_SCOPE: complete
          QA_VISUAL_INCLUDE_PUBLIC: "false"
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
        run: pnpm run qa:env && pnpm exec playwright test tests/e2e/visual-ui-audit.spec.ts --workers=2

      - name: Upload complete visual audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: complete-visual-ui-audit-${{ matrix.role }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

name: Deploy TrustedBums to DreamHost

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production app
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_ANALYTICS_MEASUREMENT_ID: ${{ secrets.VITE_GOOGLE_ANALYTICS_MEASUREMENT_ID }}
        run: pnpm run build

      - name: Include DreamHost SPA rewrite rules
        run: cp public/.htaccess dist/.htaccess

      - name: Verify crawler assets
        run: |
          test -s dist/sitemap.xml
          grep -q '<urlset' dist/sitemap.xml
          test -s dist/robots.txt
          grep -q 'Sitemap: https://trustedbums.com/sitemap.xml' dist/robots.txt
          grep -Fq 'sitemap\.xml|robots\.txt' dist/.htaccess

      - name: Deploy to DreamHost via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DREAMHOST_HOST }}
          REMOTE_USER: ${{ secrets.DREAMHOST_USER }}
          TARGET: ${{ secrets.DREAMHOST_TARGET }}
          SOURCE: dist/
          ARGS: "-rlgoDzvc --delete"
          EXCLUDE: "/node_modules/, /.git/, /.github/"

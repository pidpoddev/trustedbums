name: Deep QA Hotfix Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: URL to deep-audit
        required: true
        default: https://trustedbums.com
      mutation_mode:
        description: Create and clean up tagged QA records
        required: true
        type: boolean
        default: false

jobs:
  deep-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run deep workflow hotfix audit
        env:
          QA_BASE_URL: ${{ inputs.target_url }}
          QA_DEEP_MUTATION: ${{ inputs.mutation_mode && '1' || '0' }}
          QA_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          QA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.QA_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
          QA_CLIENT_ADMIN_EMAIL: ${{ secrets.QA_CLIENT_ADMIN_EMAIL }}
          QA_CLIENT_FINANCE_EMAIL: ${{ secrets.QA_CLIENT_FINANCE_EMAIL }}
          QA_CLIENT_MEMBER_EMAIL: ${{ secrets.QA_CLIENT_MEMBER_EMAIL }}
          QA_BUM_EMAIL: ${{ secrets.QA_BUM_EMAIL }}
        run: pnpm run qa:env && pnpm run qa:deep

      - name: Upload deep QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deep-qa-hotfix-audit
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
